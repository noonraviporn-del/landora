<!DOCTYPE html>
<html>

<head>

<title>Browse Properties</title>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getFirestore,

collection,

getDocs

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PUT-YOUR-KEY-HERE",

authDomain: "PUT-YOUR-KEY-HERE",

projectId: "PUT-YOUR-KEY-HERE",

storageBucket: "PUT-YOUR-KEY-HERE",

messagingSenderId: "PUT-YOUR-KEY-HERE",

appId: "PUT-YOUR-KEY-HERE"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function loadProperties(){

const querySnapshot = await getDocs(collection(db,"properties"));

let container=document.getElementById("list");

querySnapshot.forEach((doc)=>{

let p=doc.data();

container.innerHTML +=

`

<div>

<img src="${p.image}" width="300">

<h3>${p.title}</h3>

<p>${p.location}</p>

<p>${p.price} THB</p>

</div>

`;

});

}

window.onload=loadProperties;

</script>

</head>

<body>

<h1>Browse Properties</h1>

<div id="list"></div>

</body>

</html>
