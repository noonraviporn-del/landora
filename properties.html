<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Browse Properties | LANDORA</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* HEADER */

.header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

/* FILTER */

.filter{
background:white;
padding:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.filter select,input{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.code{
font-size:12px;
color:gray;
}

.price{
color:#2e7d32;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>Browse Properties</h2>

</div>

<div class="filter">

<select>

<option>Property Type</option>
<option>Land</option>
<option>House</option>
<option>Condo</option>

</select>

<select>

<option>Province</option>
<option>Bangkok</option>
<option>Nakhon Si Thammarat</option>
<option>Chiang Mai</option>

</select>

<input type="text" placeholder="Search location">

</div>

<div class="container">

<div class="grid">

<!-- PROPERTY 1 -->

<div class="card">

<img src="https://images.unsplash.com/photo-1500382017468-9049fed747ef">

<div class="card-content">

<div class="code">Code: LD-1001</div>

<h3>Land for Sale</h3>

<p>Nakhon Si Thammarat</p>

<div class="price">1,200,000 THB</div>

</div>

</div>

<!-- PROPERTY 2 -->

<div class="card">

<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">

<div class="card-content">

<div class="code">Code: LD-1002</div>

<h3>House for Sale</h3>

<p>Bangkok</p>

<div class="price">3,800,000 THB</div>

</div>

</div>

<!-- PROPERTY 3 -->

<div class="card">

<img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">

<div class="card-content">

<div class="code">Code: LD-1003</div>

<h3>Condo for Rent</h3>

<p>Chiang Mai</p>

<div class="price">15,000 THB / month</div>

</div>

</div>

</div>

</div>

</body>

</html>
