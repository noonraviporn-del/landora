<!DOCTYPE html>
<html>

<head>

<title>Browse Properties | LANDORA</title>

</head>

<body>

<h1>Browse Properties</h1>

<div id="propertyList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"PASTE-YOUR-KEY",
authDomain:"PASTE-YOUR-KEY",
projectId:"PASTE-YOUR-KEY",
storageBucket:"PASTE-YOUR-KEY",
messagingSenderId:"PASTE-YOUR-KEY",
appId:"PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

async function loadProperties(){

const snapshot = await getDocs(collection(db,"properties"));

let html="";

snapshot.forEach(doc=>{

let p = doc.data();

html += `

<div style="border:1px solid #ccc;padding:15px;margin:10px">

<a href="property.html?id=${doc.id}">

<img src="${p.image}" width="200">

<h3>${p.title}</h3>

</a>

<p>${p.location}</p>

<p>${p.price}</p>

</div>

`;

});

document.getElementById("propertyList").innerHTML = html;

}

loadProperties();

</script>

</body>

</html>
