<!DOCTYPE html>
<html>

<head>

<title>My Messages | LANDORA</title>

</head>

<body>

<h1>My Messages</h1>

<div id="messageList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
getFirestore,
collection,
getDocs,
query,
where
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey:"PASTE-YOUR-KEY",
authDomain:"PASTE-YOUR-KEY",
projectId:"PASTE-YOUR-KEY",
storageBucket:"PASTE-YOUR-KEY",
messagingSenderId:"PASTE-YOUR-KEY",
appId:"PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{

if(!user){

window.location.href="login.html";

return;

}

const q = query(
collection(db,"messages"),
where("toUser","==",user.uid)
);

const snapshot = await getDocs(q);

let html="";

snapshot.forEach(doc=>{

let m = doc.data();

html += `

<div style="border:1px solid #ccc;padding:15px;margin:10px">

<p><b>Message:</b> ${m.message}</p>

<p><b>Property ID:</b> ${m.propertyId}</p>

</div>

`;

});

document.getElementById("messageList").innerHTML = html;

});

</script>

</body>

</html>
