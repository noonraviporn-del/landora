<!DOCTYPE html>
<html>

<head>

<title>Property Detail | LANDORA</title>

</head>

<body>

<h1>Property Detail</h1>

<div id="propertyDetail"></div>

<hr>

<h2>Contact Owner</h2>

<textarea id="messageText" placeholder="Write your message"></textarea>

<br><br>

<button onclick="sendMessage()">

Send Message

</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
collection,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {

apiKey:"PASTE-YOUR-KEY",
authDomain:"PASTE-YOUR-KEY",
projectId:"PASTE-YOUR-KEY",
storageBucket:"PASTE-YOUR-KEY",
messagingSenderId:"PASTE-YOUR-KEY",
appId:"PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const auth = getAuth(app);

const urlParams = new URLSearchParams(window.location.search);

const propertyId = urlParams.get("id");

let ownerId;

let currentUser;

onAuthStateChanged(auth,(user)=>{

currentUser=user;

});

async function loadProperty(){

const docRef = doc(db,"properties",propertyId);

const docSnap = await getDoc(docRef);

const p = docSnap.data();

ownerId = p.userId;

document.getElementById("propertyDetail").innerHTML = `

<img src="${p.image}" width="400">

<h2>${p.title}</h2>

<p>Location: ${p.location}</p>

<p>Price: ${p.price}</p>

`;

}

window.sendMessage = async function(){

let message = document.getElementById("messageText").value;

if(!currentUser){

alert("Please login first");

return;

}

await addDoc(collection(db,"messages"),{

propertyId:propertyId,

fromUser:currentUser.uid,

toUser:ownerId,

message:message,

date:new Date()

});

alert("Message Sent");

document.getElementById("messageText").value="";

}

loadProperty();

</script>

</body>

</html>
