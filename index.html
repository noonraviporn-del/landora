<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LANDORA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.search{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input, textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:15px;
width:95%;
font-size:16px;
cursor:pointer;
}

#map{
height:300px;
width:90%;
margin:auto;
}

.post{
background:white;
margin:20px auto;
padding:20px;
width:400px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.post img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>LANDORA</h1>

<div class="search">

<h3>ค้นหาที่ดิน</h3>

<input id="searchProvince" placeholder="จังหวัด">

<input id="searchPrice" placeholder="ราคาไม่เกิน">

<button onclick="searchLand()">ค้นหา</button>

</div>

<div class="container">

<input id="title" placeholder="ชื่อประกาศ">

<input id="subdistrict" placeholder="ตำบล">

<input id="district" placeholder="อำเภอ">

<input id="province" placeholder="จังหวัด">

<input id="price" placeholder="ราคา">

<textarea id="detail" placeholder="รายละเอียด"></textarea>

<label>อัปโหลดรูป</label>
<input type="file" id="image">

<h3>เลือกตำแหน่งที่ดิน</h3>

<div id="map"></div>

<p>พิกัด: <span id="coords">ยังไม่ได้เลือก</span></p>

<button onclick="postLand()">ลงประกาศ</button>

</div>

<h2>ประกาศทั้งหมด</h2>

<div id="posts"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let lat=""
let lng=""

let map=L.map('map').setView([13.736717,100.523186],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let marker

map.on('click',function(e){

lat=e.latlng.lat
lng=e.latlng.lng

document.getElementById("coords").innerText=lat+" , "+lng

if(marker){
map.removeLayer(marker)
}

marker=L.marker([lat,lng]).addTo(map)

})

function showPosts(data){

let html=""

data.forEach(function(item){

html+=`

<div class="post">

<h3>${item.title}</h3>

<p>ตำบล: ${item.subdistrict}</p>

<p>อำเภอ: ${item.district}</p>

<p>จังหวัด: ${item.province}</p>

<p>ราคา: ${item.price}</p>

<p>${item.detail}</p>

<p>พิกัด: ${item.lat} , ${item.lng}</p>

<img src="${item.image}">

</div>

`

})

document.getElementById("posts").innerHTML=html

}

function loadAll(){

let data=JSON.parse(localStorage.getItem("lands")) || []

showPosts(data)

}

function searchLand(){

let province=document.getElementById("searchProvince").value
let price=document.getElementById("searchPrice").value

let data=JSON.parse(localStorage.getItem("lands")) || []

let result=data.filter(function(item){

let provinceMatch=item.province.includes(province)

let priceMatch=true

if(price!=""){
priceMatch=parseInt(item.price)<=parseInt(price)
}

return provinceMatch && priceMatch

})

showPosts(result)

}

function postLand(){

let title=document.getElementById("title").value
let subdistrict=document.getElementById("subdistrict").value
let district=document.getElementById("district").value
let province=document.getElementById("province").value
let price=document.getElementById("price").value
let detail=document.getElementById("detail").value
let image=document.getElementById("image").files[0]

let reader=new FileReader()

reader.onload=function(e){

let newLand={
title:title,
subdistrict:subdistrict,
district:district,
province:province,
price:price,
detail:detail,
lat:lat,
lng:lng,
image:e.target.result
}

let data=JSON.parse(localStorage.getItem("lands")) || []

data.push(newLand)

localStorage.setItem("lands",JSON.stringify(data))

loadAll()

}

reader.readAsDataURL(image)

}

loadAll()

</script>

</body>
</html>
