<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LANDORA - Marketplace ที่ดิน</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#2ecc71;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

.listing{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

img{
width:100%;
border-radius:10px;
}
</style>
  
<script src="https://maps.googleapis.com/maps/api/js"></script>
  
</head>

<body>

<h1>LANDORA</h1>

<form id="landForm">

<input type="text" id="title" placeholder="ชื่อประกาศ" required>

<input type="text" id="province" placeholder="จังหวัด" required>

<input type="number" id="price" placeholder="ราคา" required>

<textarea id="detail" placeholder="รายละเอียด"></textarea>

<label>อัปโหลดรูปที่ดิน</label>
<input type="file" id="image">
  
<div id="map" style="height:300px;margin-top:10px;"></div>
<input type="file" id="imageInput" accept="image/*">

<button type="submit">ลงประกาศ</button>

</form>

<div id="listingContainer"></div>

<script>
  
</script>
<h2 style="text-align:center;">ตำแหน่งที่ดิน</h2>

<iframe 
width="100%" 
height="400" 
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=7.8804,99.3923&output=embed">
</iframe>
 <script>

let posts = JSON.parse(localStorage.getItem("landora_posts")) || [];

function renderPosts(){
    const postContainer = document.getElementById("posts");
    postContainer.innerHTML = "";

    posts.forEach(post => {

        const div = document.createElement("div");
        div.style.border = "1px solid #ccc";
        div.style.padding = "15px";
        div.style.marginTop = "15px";

        div.innerHTML = `
        <h3>${post.title}</h3>
        <p>จังหวัด: ${post.province}</p>
        <p>ราคา: ${post.price} บาท</p>
        <p>${post.detail}</p>
        `;

        postContainer.appendChild(div);
    });
}

function addPost(){

    const title = document.getElementById("title").value;
    const province = document.getElementById("province").value;
    const price = document.getElementById("price").value;
    const detail = document.getElementById("detail").value;

    const post = {
        title,
        province,
        price,
        detail
    };

    posts.push(post);

    localStorage.setItem("landora_posts", JSON.stringify(posts));

    renderPosts();

}

renderPosts();

</script> 
</body>
</html>
