<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LANDORA - Marketplace ที่ดิน</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
background:#2ecc71;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

.listing{
background:white;
padding:15px;
margin-top:20px;
border-radius:10px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

img{
width:100%;
border-radius:10px;
}
</style>
</head>

<body>

<h1>LANDORA</h1>

<form id="landForm">

<input type="text" id="title" placeholder="ชื่อประกาศ" required>

<input type="text" id="province" placeholder="จังหวัด" required>

<input type="number" id="price" placeholder="ราคา" required>

<textarea id="detail" placeholder="รายละเอียด"></textarea>

<input type="file" id="imageInput" accept="image/*">

<button type="submit">ลงประกาศ</button>

</form>

<div id="listingContainer"></div>

<script>

const form = document.getElementById("landForm");
const container = document.getElementById("listingContainer");

form.addEventListener("submit", function(e){

e.preventDefault();

let title = document.getElementById("title").value;
let province = document.getElementById("province").value;
let price = document.getElementById("price").value;
let detail = document.getElementById("detail").value;
let imageFile = document.getElementById("imageInput").files[0];

let reader = new FileReader();

reader.onload = function(){

let listing = document.createElement("div");
listing.className = "listing";

listing.innerHTML = `
<img src="${reader.result}">
<h3>${title}</h3>
<p>จังหวัด: ${province}</p>
<p>ราคา: ${price} บาท</p>
<p>${detail}</p>
`;

container.prepend(listing);

};

if(imageFile){
reader.readAsDataURL(imageFile);
}

form.reset();

});

</script>

</body>
</html>
