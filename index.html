<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LANDORA</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:15px;
width:95%;
font-size:16px;
cursor:pointer;
}

#map{
height:300px;
width:90%;
margin:auto;
}

.post{
background:white;
margin:20px auto;
padding:20px;
width:400px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.post img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>LANDORA</h1>

<div class="container">

<input id="title" placeholder="ชื่อประกาศ">

<input id="subdistrict" placeholder="ตำบล">

<input id="district" placeholder="อำเภอ">

<input id="province" placeholder="จังหวัด">

<input id="price" placeholder="ราคา">

<textarea id="detail" placeholder="รายละเอียด"></textarea>

<label>อัปโหลดรูปที่ดิน</label>
<input type="file" id="image">

<h3>เลือกตำแหน่งที่ดิน</h3>

<div id="map"></div>

<p>พิกัด: <span id="coords">ยังไม่ได้เลือก</span></p>

<button onclick="postLand()">ลงประกาศ</button>

</div>

<h2>ประกาศที่ดิน</h2>

<div id="posts"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let lat=""
let lng=""

let map=L.map('map').setView([13.736717,100.523186],6)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let marker

map.on('click',function(e){

lat=e.latlng.lat
lng=e.latlng.lng

document.getElementById("coords").innerText=lat+" , "+lng

if(marker){
map.removeLayer(marker)
}

marker=L.marker([lat,lng]).addTo(map)

})

function postLand(){

let title=document.getElementById("title").value
let subdistrict=document.getElementById("subdistrict").value
let district=document.getElementById("district").value
let province=document.getElementById("province").value
let price=document.getElementById("price").value
let detail=document.getElementById("detail").value
let image=document.getElementById("image").files[0]

let reader=new FileReader()

reader.onload=function(e){

let postHTML=`

<div class="post">

<h3>${title}</h3>

<p>ตำบล: ${subdistrict}</p>

<p>อำเภอ: ${district}</p>

<p>จังหวัด: ${province}</p>

<p>ราคา: ${price}</p>

<p>${detail}</p>

<p>พิกัด: ${lat} , ${lng}</p>

<img src="${e.target.result}">

</div>

`

document.getElementById("posts").innerHTML+=postHTML

}

reader.readAsDataURL(image)

}

</script>

</body>
</html>
