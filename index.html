<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Marketplace</title>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#1877f2;
color:white;
padding:15px;
font-size:22px;
text-align:center;
}

.container{
width:90%;
max-width:900px;
margin:auto;
margin-top:20px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:#1877f2;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0f63d1;
}

.post{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

img{
width:100%;
border-radius:10px;
margin-top:10px;
}

.actions{
margin-top:10px;
}

.delete{
background:red;
}

.edit{
background:orange;
}

</style>

</head>

<body>

<header>
Marketplace ซื้อขายสินค้า
</header>

<div class="container">

<div class="form-box">

<h3>ลงขายสินค้า</h3>

<input id="title" placeholder="ชื่อสินค้า">

<input id="price" placeholder="ราคา">

<input id="province" placeholder="จังหวัด">

<input id="district" placeholder="อำเภอ">

<input id="subdistrict" placeholder="ตำบล">

<input type="file" id="image">

<button onclick="addPost()">โพสต์ขาย</button>

<p id="result"></p>

</div>

<div id="posts"></div>

</div>

<script>

const firebaseConfig = {
apiKey:"YOUR_API",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_PROJECT",
storageBucket:"YOUR_BUCKET",
messagingSenderId:"YOUR_ID",
appId:"YOUR_APP"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

function addPost(){

const title=document.getElementById("title").value;
const price=document.getElementById("price").value;
const province=document.getElementById("province").value;
const district=document.getElementById("district").value;
const subdistrict=document.getElementById("subdistrict").value;

db.collection("posts").add({

title:title,
price:price,
province:province,
district:district,
subdistrict:subdistrict,
date:Date.now()

})
.then(()=>{

document.getElementById("result").innerHTML="โพสต์สำเร็จ";

loadPosts();

})

.catch(()=>{

document.getElementById("result").innerHTML="โพสต์ไม่สำเร็จ";

});

}

function loadPosts(){

db.collection("posts").orderBy("date","desc").get()
.then((snapshot)=>{

let html="";

snapshot.forEach((doc)=>{

const data=doc.data();

html+=`

<div class="post">

<h3>${data.title}</h3>

<p>ราคา : ${data.price}</p>

<p>${data.subdistrict} ${data.district} ${data.province}</p>

<div class="actions">

<button class="edit" onclick="editPost('${doc.id}')">แก้ไข</button>

<button class="delete" onclick="deletePost('${doc.id}')">ลบ</button>

</div>

</div>

`;

});

document.getElementById("posts").innerHTML=html;

});

}

function deletePost(id){

db.collection("posts").doc(id).delete()

.then(()=>{

loadPosts();

});

}

function editPost(id){

const newTitle=prompt("ชื่อสินค้าใหม่");

const newPrice=prompt("ราคาใหม่");

db.collection("posts").doc(id).update({

title:newTitle,
price:newPrice

})

.then(()=>{

loadPosts();

});

}

loadPosts();

</script>

</body>
</html>
