<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>LANDORA</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:90%;
padding:10px;
margin:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:15px;
width:95%;
font-size:16px;
cursor:pointer;
}

.post{
background:white;
margin:20px auto;
padding:20px;
width:400px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.post img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<h1>LANDORA</h1>

<div class="container">

<input id="title" placeholder="ชื่อประกาศ">

<input id="province" placeholder="จังหวัด">

<input id="price" placeholder="ราคา">

<textarea id="detail" placeholder="รายละเอียด"></textarea>

<label>อัปโหลดรูปที่ดิน</label>
<input type="file" id="image">

<button onclick="postLand()">ลงประกาศ</button>

</div>


<h2>ประกาศที่ดิน</h2>

<div id="posts"></div>


<script>

function postLand(){

let title=document.getElementById("title").value
let province=document.getElementById("province").value
let price=document.getElementById("price").value
let detail=document.getElementById("detail").value
let image=document.getElementById("image").files[0]

let reader=new FileReader()

reader.onload=function(e){

let postHTML=`

<div class="post">

<h3>${title}</h3>

<p>จังหวัด: ${province}</p>

<p>ราคา: ${price}</p>

<p>${detail}</p>

<img src="${e.target.result}">

</div>

`

document.getElementById("posts").innerHTML+=postHTML

}

reader.readAsDataURL(image)

}

</script>

</body>
</html>
