<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ลงประกาศขายที่ดิน - LANDORA</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#28a745;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
width:90%;
max-width:600px;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

button{
background:#28a745;
color:white;
border:none;
padding:15px;
width:100%;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<header>
LANDORA ลงประกาศขายที่ดิน
</header>

<div class="container">

<label>ชื่อประกาศ</label>
<input type="text" id="title" placeholder="เช่น ที่ดินติดถนนใหญ่">

<label>จังหวัด</label>
<input type="text" id="province" placeholder="เช่น นครศรีธรรมราช">

<label>ราคา (บาท)</label>
<input type="number" id="price" placeholder="เช่น 2500000">

<label>รายละเอียด</label>
<textarea id="detail" rows="4" placeholder="เช่น เหมาะสร้างบ้าน ทำธุรกิจ"></textarea>

<label>เบอร์โทรติดต่อ</label>
<input type="text" id="phone" placeholder="เช่น 0812345678">

<button onclick="submitPost()">ลงประกาศ</button>

</div>

<script>

function submitPost(){

let title = document.getElementById("title").value;
let province = document.getElementById("province").value;
let price = document.getElementById("price").value;

if(title == "" || province == "" || price == ""){

alert("กรุณากรอกข้อมูลให้ครบ");

}else{

alert("ประกาศถูกส่งเรียบร้อย (ระบบกำลังพัฒนา)");

}

}

</script>

</body>
</html>
