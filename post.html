<!DOCTYPE html>
<html>

<head>

<title>Post Property | LANDORA</title>

</head>

<body>

<h1>Post Property</h1>

<div id="formArea" style="display:none;">

<input id="title" placeholder="Property Title">

<br><br>

<input id="location" placeholder="Location">

<br><br>

<input id="price" placeholder="Price">

<br><br>

<input type="file" id="imageFile">

<br><br>

<button onclick="postProperty()">

Post Property

</button>

</div>

<p id="loginMessage"></p>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {

getFirestore,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {

getStorage,
ref,
uploadBytes,
getDownloadURL

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey: "PASTE-YOUR-KEY",
authDomain: "PASTE-YOUR-KEY",
projectId: "PASTE-YOUR-KEY",
storageBucket: "PASTE-YOUR-KEY",
messagingSenderId: "PASTE-YOUR-KEY",
appId: "PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const storage = getStorage(app);

let currentUser;

onAuthStateChanged(auth,(user)=>{

if(user){

currentUser=user;

document.getElementById("formArea").style.display="block";

}else{

document.getElementById("loginMessage").innerHTML=

'You must <a href="login.html">login</a> to post property';

}

});

window.postProperty = async function(){

let title=document.getElementById("title").value;

let location=document.getElementById("location").value;

let price=document.getElementById("price").value;

let file=document.getElementById("imageFile").files[0];

let storageRef = ref(storage,"images/"+file.name);

await uploadBytes(storageRef,file);

let imageURL = await getDownloadURL(storageRef);

await addDoc(collection(db,"properties"),{

title:title,
location:location,
price:price,
image:imageURL,
userId:currentUser.uid

});

alert("Property Posted");

}

</script>

</body>

</html>
