<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Property | LANDORA</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2e7d32;
color:white;
padding:12px;
border:none;
width:100%;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.code{
margin-top:20px;
background:#f1f1f1;
padding:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<h2>Post Property</h2>

</div>

<div class="container">

<form id="propertyForm">

<label>Property Title</label>
<input type="text" required>

<label>Property Type</label>
<select>

<option>Land</option>
<option>House</option>
<option>Condo</option>
<option>Commercial</option>

</select>

<label>Province</label>
<input type="text" required>

<label>District</label>
<input type="text" required>

<label>Price (THB)</label>
<input type="number" required>

<label>Description</label>
<textarea rows="4"></textarea>

<label>Allow Agents to Sell?</label>
<select id="agentOption">

<option value="no">No</option>
<option value="yes">Yes</option>

</select>

<div id="commissionBox" style="display:none;">

<label>Commission (%)</label>
<input type="number">

</div>

<button type="submit">

Post Property

</button>

</form>

<div class="code" id="propertyCode"></div>

</div>

<script>

let propertyNumber = 1001;

document.getElementById("agentOption").addEventListener("change",function(){

if(this.value === "yes"){
document.getElementById("commissionBox").style.display="block";
}else{
document.getElementById("commissionBox").style.display="none";
}

});

document.getElementById("propertyForm").addEventListener("submit",function(e){

e.preventDefault();

let code = "LD-" + propertyNumber;

document.getElementById("propertyCode").innerHTML =
"Property Posted Successfully!<br><b>Property Code: "+code+"</b>";

propertyNumber++;

});

</script>

</body>

</html>
