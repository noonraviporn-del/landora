<!DOCTYPE html>
<html>

<head>

<title>Post Property</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

</head>

<body>

<h2>Post Property</h2>

<input id="title" placeholder="Property Title">

<br><br>

<input id="location" placeholder="Location">

<br><br>

<input id="price" placeholder="Price">

<br><br>

<input id="image" placeholder="Image URL">

<br><br>

<button onclick="postProperty()">

Post Property

</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getFirestore, collection, addDoc }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PUT-YOUR-KEY-HERE",

authDomain: "PUT-YOUR-KEY-HERE",

projectId: "PUT-YOUR-KEY-HERE",

storageBucket: "PUT-YOUR-KEY-HERE",

messagingSenderId: "PUT-YOUR-KEY-HERE",

appId: "PUT-YOUR-KEY-HERE"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.postProperty = async function(){

let title=document.getElementById("title").value;

let location=document.getElementById("location").value;

let price=document.getElementById("price").value;

let image=document.getElementById("image").value;

await addDoc(collection(db,"properties"),{

title:title,

location:location,

price:price,

image:image

});

alert("Property Posted");

}

</script>

</body>

</html>
