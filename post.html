<!DOCTYPE html>
<html>
<head>
<title>Post Property - LANDORA</title>
<meta charset="UTF-8">

<style>
body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:600px;
margin:auto;
background:white;
padding:20px;
margin-top:40px;
border-radius:8px;
}

input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
background:#007bff;
color:white;
padding:12px;
border:none;
width:100%;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Post Property</h2>

<label>Property Title</label>
<input type="text" placeholder="Land for sale">

<label>Price</label>
<input type="number" placeholder="Price">

<label>Province</label>
<input type="text" placeholder="Province">

<label>Latitude (Google Map)</label>
<input type="text" placeholder="Example: 8.4304">

<label>Longitude (Google Map)</label>
<input type="text" placeholder="Example: 99.9631">

<label>Description</label>
<textarea placeholder="Property details"></textarea>

<button>Submit Property</button>

</div>

</body>
</html>
