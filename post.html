<!DOCTYPE html>
<html>

<head>

<title>Post Property | LANDORA</title>

</head>

<body>

<h1>Post Property</h1>

<input id="title" placeholder="Property Title">

<br><br>

<input id="location" placeholder="Location">

<br><br>

<input id="price" placeholder="Price">

<br><br>

<input type="file" id="imageFile">

<br><br>

<button onclick="postProperty()">

Post Property

</button>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getFirestore,
collection,
addDoc

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {

getStorage,
ref,
uploadBytes,
getDownloadURL

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {

apiKey: "PASTE-YOUR-KEY",
authDomain: "PASTE-YOUR-KEY",
projectId: "PASTE-YOUR-KEY",
storageBucket: "PASTE-YOUR-KEY",
messagingSenderId: "PASTE-YOUR-KEY",
appId: "PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const storage = getStorage(app);

window.postProperty = async function(){

let title=document.getElementById("title").value;

let location=document.getElementById("location").value;

let price=document.getElementById("price").value;

let file=document.getElementById("imageFile").files[0];

let storageRef = ref(storage,"images/"+file.name);

await uploadBytes(storageRef,file);

let imageURL = await getDownloadURL(storageRef);

await addDoc(collection(db,"properties"),{

title:title,

location:location,

price:price,

image:imageURL

});

alert("Property Posted");

}

</script>

</body>

</html>
