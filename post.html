<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ลงประกาศอสังหา - LANDORA</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
}

header{
background:#1fa34a;
color:white;
text-align:center;
padding:25px;
}

.container{
width:80%;
margin:auto;
background:white;
padding:30px;
margin-top:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
background:#1fa34a;
color:white;
padding:15px 30px;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#14853a;
}

.success{
background:#e6ffe6;
padding:15px;
margin-top:20px;
display:none;
}

</style>

</head>

<body>

<header>

<h1>LANDORA</h1>
<p>ลงประกาศขายที่ดิน บ้าน หรืออสังหาริมทรัพย์</p>

</header>

<div class="container">

<h2>กรอกข้อมูลอสังหาริมทรัพย์</h2>

<label>หัวข้อประกาศ</label>
<input id="title" placeholder="เช่น ที่ดินติดถนนใหญ่">

<label>จังหวัด</label>
<input id="province" placeholder="เช่น นครศรีธรรมราช">

<label>อำเภอ</label>
<input id="district" placeholder="เช่น เมือง">

<label>ราคา</label>
<input id="price" placeholder="เช่น 2,500,000">

<label>รายละเอียด</label>
<textarea id="detail" rows="5"></textarea>

<button onclick="submitPost()">ลงประกาศ</button>

<div class="success" id="successMsg">

✅ ลงประกาศสำเร็จ (ตัวอย่างระบบ)

</div>

</div>

<script>

function submitPost(){

let title = document.getElementById("title").value;

if(title==""){
alert("กรุณากรอกหัวข้อประกาศ");
return;
}

document.getElementById("successMsg").style.display="block";

}

</script>

</body>

</html>
