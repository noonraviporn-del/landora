<!DOCTYPE html>
<html>

<head>

<title>Edit Property | LANDORA</title>

</head>

<body>

<h1>Edit Property</h1>

<input id="title">

<br><br>

<input id="location">

<br><br>

<input id="price">

<br><br>

<button onclick="updateProperty()">

Update Property

</button>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PASTE-YOUR-KEY",
authDomain: "PASTE-YOUR-KEY",
projectId: "PASTE-YOUR-KEY",
storageBucket: "PASTE-YOUR-KEY",
messagingSenderId: "PASTE-YOUR-KEY",
appId: "PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);

const id = urlParams.get("id");

async function loadData(){

const docRef = doc(db,"properties",id);

const docSnap = await getDoc(docRef);

const data = docSnap.data();

document.getElementById("title").value=data.title;

document.getElementById("location").value=data.location;

document.getElementById("price").value=data.price;

}

loadData();

window.updateProperty = async function(){

await updateDoc(doc(db,"properties",id),{

title:document.getElementById("title").value,
location:document.getElementById("location").value,
price:document.getElementById("price").value

});

alert("Property Updated");

window.location.href="dashboard.html";

}

</script>

</body>

</html>
