<!DOCTYPE html>
<html>

<head>

<title>My Properties | LANDORA</title>

</head>

<body>

<h1>My Properties</h1>

<div id="propertyList"></div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {

getAuth,
onAuthStateChanged

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {

getFirestore,
collection,
getDocs,
query,
where

}

from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

apiKey: "PASTE-YOUR-KEY",
authDomain: "PASTE-YOUR-KEY",
projectId: "PASTE-YOUR-KEY",
storageBucket: "PASTE-YOUR-KEY",
messagingSenderId: "PASTE-YOUR-KEY",
appId: "PASTE-YOUR-KEY"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="login.html";

return;

}

const q = query(

collection(db,"properties"),

where("userId","==",user.uid)

);

const snapshot = await getDocs(q);

let html="";

snapshot.forEach(doc=>{

let p=doc.data();

html+=`

<div>

<h3>${p.title}</h3>

<img src="${p.image}" width="200">

<p>${p.location}</p>

<p>${p.price}</p>

</div>

<hr>

`;

});

document.getElementById("propertyList").innerHTML=html;

});

</script>

</body>

</html>
